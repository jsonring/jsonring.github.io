// 渲染文档正文
function renderDoc(data) {
    const wrap = document.getElementById("docContent");
    let html = "";
    data.contentList.forEach(item => {
        if(item.title) {
            html += `<h2>${item.serial}、${item.title}</h2><ul>`;
            item.subItems.forEach(sub=>{
                html += `<li><strong>${sub.num}、${sub.name}</strong>：${sub.spec}</li>`;
            })
            html += `</ul>`;
        } else {
            html += `<h2>${item.serial}、${item.desc}</h2>`;
            if(item.deviceInfo) {
                let infoText = "";
                for(let key in item.deviceInfo){
                    infoText += `${key}：${item.deviceInfo[key]}；`
                }
                html += `<div class="tip-box">设备参数：${infoText}</div>`
            }
            if(item.materialSpec) {
                let matText = "";
                for(let key in item.materialSpec){
                    matText += `${key}：${item.materialSpec[key]}；`
                }
                html += `<div class="tip-box">材质规格：${matText}</div>`
            }
        }
    })
    wrap.innerHTML = html;
}
